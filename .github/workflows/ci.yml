name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # package-lock.json is gitignored in this repo, so npm install (not ci).
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    # Publish the playable build to gh-pages on every green master push.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Assemble site
        run: |
          mkdir -p site/dist
          cp index.html site/
          cp dist/bundle.js site/dist/
          cp -r resources site/resources
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
